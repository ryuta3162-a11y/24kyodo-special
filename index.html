<!DOCTYPE html>
<html lang="ja" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOYFIT24経堂 | お得な入会キャンペーン</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            color: #F3F4F6;
            background-image: 
                linear-gradient(rgba(17, 24, 39, 0.85), rgba(17, 24, 39, 0.9)),
                url('https://images.unsplash.com/photo-1571902943202-507ec2618e8f?q=80&w=1975&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }

        :root {
            --brand-red: #D90429;
            --brand-red-dark: #B30021;
        }
        .text-brand-red { color: var(--brand-red); } 
        .bg-brand-red { background-color: var(--brand-red); }
        .hover\:bg-brand-red-dark:hover { background-color: var(--brand-red-dark); }
        .border-brand-red { border-color: var(--brand-red); }

        /* カード本体のスタイル：メタリックフレーム風 */
        .campaign-card {
            background-color: #FFFFFF;
            position: relative;
            overflow: visible;
            
            /* メタリック調の赤枠 */
            border: 4px solid transparent;
            background-image: linear-gradient(#fff, #fff), linear-gradient(135deg, #ff8a9e 0%, #D90429 50%, #8a001a 100%);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            
            border-radius: 1.5rem;
            color: #1F2937;
            
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            
            margin-top: 2rem; 
        }
        
        .campaign-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(217, 4, 41, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
        }

        /* メタリックバッジ */
        .metallic-badge {
            position: absolute;
            top: -1.25rem;
            left: 50%;
            transform: translateX(-50%);
            
            background: linear-gradient(135deg, #FF6B6B 0%, #D90429 50%, #8B0000 100%);
            color: white;
            font-weight: 900;
            letter-spacing: 0.1em;
            padding: 0.5rem 2rem;
            border-radius: 9999px;
            
            border: 2px solid #FECACA;
            
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3), inset 0 2px 4px rgba(255,255,255,0.3);
            
            white-space: nowrap;
            z-index: 10;
        }

        /* 内部のジム風パネル（価格表示エリア） */
        .gym-panel {
            background: linear-gradient(to bottom right, #F9FAFB, #E5E7EB);
            border: 1px solid #D1D5DB;
            border-radius: 0.75rem;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.05);
            padding: 1.5rem 0.5rem;
            text-align: center;
        }

        .campaign-card h3 { color: #111827; }
        .campaign-card p { color: #4B5563; }

        .cta-button {
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        
        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(217, 4, 41, 0.2), 0 4px 6px -2px rgba(217, 4, 41, 0.15);
        }
    </style>
</head>
<body class="antialiased">

    <!-- Header Section -->
    <header class="w-full">
        <div class="container mx-auto px-6 pt-16 pb-4 flex flex-col justify-center items-center text-center">
            
            <h1 class="text-4xl md:text-6xl font-black text-white leading-tight tracking-tight drop-shadow-lg">
                JOYFIT24 <span class="text-brand-red">経堂</span>
            </h1>
            <h2 class="mt-8 text-3xl md:text-5xl font-bold text-white drop-shadow-lg">
                SPECIAL CAMPAIGN
            </h2>
            <p class="mt-4 text-lg md:text-xl font-bold text-white max-w-2xl drop-shadow-md">
                追加特典はこちらから
            </p>
        </div>
    </header>

    <!-- Main Content: Campaign Section -->
    <main id="campaigns" class="pt-8 pb-20 sm:pb-24">
        <div class="container mx-auto px-6">
            
            <!-- Grid for Campaign Cards -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 lg:gap-8">

                <!-- 特典01: お友達紹介キャンペーン -->
                <div class="campaign-card p-8 pt-12 flex flex-col h-full text-center">
                    <div class="metallic-badge">特典 01</div>

                    <div class="flex-grow">
                        <h3 class="text-2xl font-bold mt-2 mb-6">お友達紹介キャンペーン</h3>
                    </div>
                    <!-- 統一されたジム風パネル -->
                    <div class="gym-panel flex flex-col justify-center items-center">
                        <p class="text-sm font-bold text-gray-600 mb-1">紹介者・入会者どちらも</p>
                        <div class="flex items-baseline justify-center text-brand-red my-1">
                            <span class="text-4xl font-black">1,000</span>
                            <span class="text-xl font-bold ml-1">pt</span>
                        </div>
                        <p class="text-base font-bold text-gray-700">Enjoyポイントプレゼント</p>
                        <p class="text-xs text-gray-500 font-bold mt-3">※新規入会者限定</p>
                    </div>
                    
                    <a href="referral_form.html" class="cta-button w-full mt-8 block text-center bg-brand-red text-white font-bold py-4 px-8 rounded-lg hover:bg-brand-red-dark">
                        専用フォームから申請
                    </a>
                </div>

                <!-- 特典02: 学校関係者割 -->
                <div class="campaign-card p-8 pt-12 flex flex-col h-full text-center">
                    <div class="metallic-badge">特典 02</div>

                    <div class="flex-grow">
                        <h3 class="text-2xl font-bold mt-2 mb-6">学校関係者割</h3>
                    </div>
                    <!-- 統一されたジム風パネル -->
                    <div class="gym-panel">
                        <div class="grid grid-cols-2 divide-x divide-gray-300">
                            <!-- 学生 -->
                            <div class="px-1 border-r border-gray-300">
                                <p class="text-xs font-bold text-gray-600">学生</p>
                                <div class="my-1">
                                    <p class="text-xl font-bold text-brand-red leading-tight">7,150円</p>
                                    <p class="text-[10px] text-brand-red font-bold">(税込)</p>
                                </div>
                                <p class="text-[10px] text-gray-500 font-bold">2,200円引</p>
                            </div>
                            <!-- 教職員 -->
                            <div class="px-1">
                                <p class="text-xs font-bold text-gray-600">教職員</p>
                                <div class="my-1">
                                    <p class="text-xl font-bold text-gray-700 leading-tight">8,250円</p>
                                    <p class="text-[10px] text-gray-600 font-bold">(税込)</p>
                                </div>
                                <p class="text-[10px] text-gray-500 font-bold">1,100円引</p>
                            </div>
                        </div>
                        <p class="text-xs text-gray-500 font-bold mt-3">※新規入会者限定</p>
                    </div>
                    
                    <a href="https://forms.gle/PCrYhsMrFGtQocZe6" target="_blank" rel="noopener noreferrer" class="cta-button w-full mt-8 block text-center bg-brand-red text-white font-bold py-4 px-8 rounded-lg hover:bg-brand-red-dark">
                        専用フォームから申請
                    </a>
                </div>

                <!-- 特典03: 他クラブ乗り換え割 -->
                <div class="campaign-card p-8 pt-12 flex flex-col h-full text-center">
                    <div class="metallic-badge">特典 03</div>

                    <div class="flex-grow">
                        <h3 class="text-2xl font-bold mt-2 mb-6">他クラブ乗り換え割</h3>
                    </div>
                    <!-- 統一されたジム風パネル -->
                    <div class="gym-panel flex flex-col items-center justify-center min-h-[120px]">
                        <div class="flex items-baseline justify-center w-full">
                            <span class="text-lg md:text-xl font-bold mr-2 text-gray-700">翌月会費が</span>
                            <span class="text-4xl font-black text-brand-red">0</span>
                            <span class="text-xl md:text-2xl font-bold ml-1 text-gray-700">円に！</span>
                        </div>
                        <p class="text-xs text-gray-500 font-bold mt-3">※新規入会者限定</p>
                    </div>
                    
                    <a href="transfer_form.html" class="cta-button w-full mt-8 block text-center bg-brand-red text-white font-bold py-4 px-8 rounded-lg hover:bg-brand-red-dark">
                        専用フォームから申請
                    </a>
                </div>

            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-black/50 border-t border-gray-700 backdrop-blur-sm">
        <div class="container mx-auto px-6 py-8 text-center text-gray-400">
        </div>
    </footer>

</body>
</html>
